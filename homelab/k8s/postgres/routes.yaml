# HTTPRoute for pgAdmin web UI
# Requires DNS: pgadmin.lofi -> any k8s node IP (10.0.0.6, .7, or .8)

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin
  namespace: postgres
spec:
  parentRefs:
    - name: homelab
      namespace: traefik
      sectionName: https-pgadmin
  hostnames:
    - pgadmin.zen.lofi
  rules:
    - backendRefs:
        - name: pgadmin
          port: 80
