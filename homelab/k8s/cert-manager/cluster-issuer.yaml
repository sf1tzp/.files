# ClusterIssuer for step-ca ACME + Certificate resources
# The <CA_BUNDLE> placeholder is replaced at deploy time by the justfile
# with the base64-encoded step-ca root CA certificate.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: step-ca
spec:
  acme:
    server: https://step-ca.lofi:9000/acme/acme/directory
    caBundle: <CA_BUNDLE>
    privateKeySecretRef:
      name: step-ca-acme-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: homelab
                namespace: traefik

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gitea-tls
  namespace: traefik
spec:
  secretName: gitea-tls
  issuerRef:
    name: step-ca
    kind: ClusterIssuer
  dnsNames:
    - gitea.zen.lofi

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pgadmin-tls
  namespace: traefik
spec:
  secretName: pgadmin-tls
  issuerRef:
    name: step-ca
    kind: ClusterIssuer
  dnsNames:
    - pgadmin.zen.lofi
