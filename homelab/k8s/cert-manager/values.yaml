# cert-manager Helm chart values
# Chart: jetstack/cert-manager
# Docs: https://cert-manager.io/docs/installation/helm/

image:
  tag: v1.20.2

cainjector:
  image:
    tag: v1.20.2

webhook:
  image:
    tag: v1.20.2

crds:
  enabled: true

config:
  enableGatewayAPI: true

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
