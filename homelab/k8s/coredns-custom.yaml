# Forward .lofi DNS queries to the homelab DNS server (dnsmasq)
# CoreDNS imports /etc/coredns/custom/*.server for additional server blocks

apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  lofi.server: |
    lofi:53 {
      errors
      cache 30
      forward . 10.0.0.2
    }
