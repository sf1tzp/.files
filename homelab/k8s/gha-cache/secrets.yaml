# SOPS-encrypted connection/env vars for github-actions-cache-server.
# Encrypt with: just encrypt-secrets
# Edit with:    just edit-secrets gha-cache
#
# AWS_* keys MUST match the RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY values in
# rustfs/secrets.yaml. The Postgres password in DB_POSTGRES_URL MUST match
# the GHA_CACHE_PG_PASSWORD in postgres/secrets.yaml.

apiVersion: v1
kind: Secret
metadata:
  name: gha-cache-env
  namespace: gha-cache
stringData:
  AWS_ACCESS_KEY_ID: CHANGEME_MATCH_RUSTFS_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: CHANGEME_MATCH_RUSTFS_SECRET_KEY
  AWS_ENDPOINT_URL: http://rustfs-svc.rustfs.svc.cluster.local:9000
  AWS_REGION: us-east-1
  STORAGE_S3_BUCKET: gha-cache
  DB_POSTGRES_URL: postgres://gha_cache:CHANGEME_MATCH_GHA_CACHE_PG_PASSWORD@postgres-postgresql.postgres.svc.cluster.local:5432/gha_cache
