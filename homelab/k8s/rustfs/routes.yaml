# HTTPRoutes for the rustfs S3 API (s3.zen.lofi) and web console (s3-console.zen.lofi).
# Requires DNS: s3.lofi / s3-console.lofi -> any k8s node IP.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-s3
  namespace: rustfs
spec:
  parentRefs:
    - name: homelab
      namespace: traefik
      sectionName: https-rustfs-s3
  hostnames:
    - s3.zen.lofi
  rules:
    - backendRefs:
        - name: rustfs-svc
          port: 9000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-console
  namespace: rustfs
spec:
  parentRefs:
    - name: homelab
      namespace: traefik
      sectionName: https-rustfs-console
  hostnames:
    - s3-console.zen.lofi
  rules:
    - backendRefs:
        - name: rustfs-svc
          port: 9001
