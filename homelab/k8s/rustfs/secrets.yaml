# SOPS-encrypted rustfs credentials
# Encrypt with: just encrypt-secrets
# Edit with:    just edit-secrets rustfs
#
# Keys RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY are consumed by the chart's StatefulSet
# via envFrom when secret.existingSecret is set. The bucket-init Job also reads them.

apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: rustfs
stringData:
  RUSTFS_ACCESS_KEY: CHANGEME_ACCESS_KEY
  RUSTFS_SECRET_KEY: CHANGEME_SECRET_KEY_MIN_32_CHARS_LONG
