# Gitea Actions Runner Helm chart values
# Chart: gitea-charts/actions
# Docs: https://gitea.com/gitea/helm-actions
#
# Prerequisites:
#   1. Gitea must be running with actions.ENABLED = true
#   2. Create a runner registration token in Gitea:
#      Site Administration > Runners > Create new Runner
#   3. Create the k8s secret:
#      kubectl create secret generic runner-token \
#        --namespace gitea-actions \
#        --from-literal=token=<YOUR_TOKEN>

enabled: true

# --- Connection to Gitea ---
giteaRootURL: "http://gitea-http.gitea.svc.cluster.local:3000"

existingSecret: "runner-token"
existingSecretKey: "token"

# --- Runner StatefulSet ---
statefulset:
  replicas: 4
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist

  persistence:
    enabled: true
    size: 5Gi

  # Mount daemon.json into DinD sidecar for insecure registry support
  extraVolumes:
    - name: docker-daemon-config
      configMap:
        name: docker-daemon-config

  actRunner:
    config: |
      log:
        level: info
      cache:
        enabled: true
      container:
        network: bridge
        docker_timeout: 300s
        options: --add-host=gitea.zen.lofi:10.0.0.6

  dind:
    extraVolumeMounts:
      - name: docker-daemon-config
        mountPath: /etc/docker/daemon.json
        subPath: daemon.json

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
