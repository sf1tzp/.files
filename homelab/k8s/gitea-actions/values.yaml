# Gitea Actions Runner Helm chart values
# Default Values: https://gitea.com/gitea/helm-actions/src/branch/main/values.yaml
#
# Prerequisites:
#   1. Gitea must be running with actions.ENABLED = true
#   2. Create a runner registration token in Gitea:
#      Site Administration > Runners > Create new Runner
#   3. Create the k8s secret:
#      kubectl create secret generic runner-token \
#        --namespace gitea-actions \
#        --from-literal=token=<YOUR_TOKEN>

enabled: true

# --- Connection to Gitea ---
giteaRootURL: "http://gitea-http.gitea.svc.cluster.local:3000"

existingSecret: "runner-token"
existingSecretKey: "token"

# --- Runner StatefulSet ---
statefulset:
  replicas: 4
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist

  persistence:
    enabled: true
    size: 10Gi

  # Mount daemon.json and lab CA into DinD sidecar for registry trust.
  #
  # daemon.json disables containerd-snapshotter (Docker 29.x default) because
  # the containerd image store ignores "insecure-registries" — its resolver has
  # its own TLS config, but dockerd's embedded containerd doesn't expose a way
  # to set registry cert paths. Disabling the snapshotter falls back to the
  # classic Docker image store where "insecure-registries" works for our lab CA.
  # To re-enable: build a custom DinD image that adds the lab CA to the system
  # trust store before dockerd starts (update-ca-certificates in entrypoint).
  extraVolumes:
    - name: docker-daemon-config
      configMap:
        name: docker-daemon-config

  actRunner:
    registry: docker.gitea.com
    repository: act_runner
    tag: "0.4.1"
    pullPolicy: IfNotPresent
    # Disable the built-in cache so runners use the external gha-cache server.
    # ACTIONS_RESULTS_URL / ACTIONS_CACHE_URL point at the in-cluster Service;
    # trailing slash on ACTIONS_RESULTS_URL is required by the cache server.
    config: |
      log:
        level: info
      cache:
        enabled: false
      container:
        network: bridge
        docker_timeout: 300s
        options: --add-host=gitea.zen.lofi:10.0.0.6
    extraEnvs:
      - name: ACTIONS_RESULTS_URL
        value: "http://gha-cache.gha-cache.svc.cluster.local:3000/"
      - name: ACTIONS_CACHE_URL
        value: "http://gha-cache.gha-cache.svc.cluster.local:3000/"
      - name: RUNNER_TOOL_CACHE
        value: "/data/hostedtoolcache"

  dind:
    registry: docker.io
    repository: docker
    tag: "29.4.0-dind"
    pullPolicy: IfNotPresent
    extraVolumeMounts:
      - name: docker-daemon-config
        mountPath: /etc/docker/daemon.json
        subPath: daemon.json


init:
  image:
    registry: docker.io
    repository: busybox
    tag: "1.37.0"

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
