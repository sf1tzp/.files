# Gitea Actions Runner Helm chart values
# Default Values: https://gitea.com/gitea/helm-actions/src/branch/main/values.yaml
#
# Prerequisites:
#   1. Gitea must be running with actions.ENABLED = true
#   2. Create a runner registration token in Gitea:
#      Site Administration > Runners > Create new Runner
#   3. Create the k8s secret:
#      kubectl create secret generic runner-token \
#        --namespace gitea-actions \
#        --from-literal=token=<YOUR_TOKEN>

enabled: true

# --- Connection to Gitea ---
giteaRootURL: "http://gitea-http.gitea.svc.cluster.local:3000"

existingSecret: "runner-token"
existingSecretKey: "token"

# --- Runner StatefulSet ---
statefulset:
  replicas: 2
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist

  persistence:
    enabled: true
    size: 10Gi

  # SSH keys for prod deploys; surfaced into job containers via DinD bind-mount.
  # The lab CA is baked into our custom DinD image (gitea.zen.lofi/sfi/dind),
  # so no daemon.json or per-registry configmap is needed here.
  extraVolumes:
    - name: runner-ssh
      secret:
        secretName: runner-ssh
        defaultMode: 0400

  actRunner:
    registry: docker.gitea.com
    repository: act_runner
    tag: "0.4.1"
    pullPolicy: IfNotPresent
    # Disable the built-in cache so runners use the external gha-cache server.
    # ACTIONS_RESULTS_URL / ACTIONS_CACHE_URL point at the in-cluster Service;
    # trailing slash on ACTIONS_RESULTS_URL is required by the cache server.
    #
    # runner.labels override the registered labels: ubuntu-latest keeps the
    # upstream catthehacker image; ubuntu-deploy maps to our custom image
    # (sops/age/just/lab-CA + entrypoint that materializes ~/.ssh from the
    # runner-ssh volume).
    #
    # container.options binds /run/ssh-secrets from the DinD sidecar into every
    # job container; valid_volumes whitelists the path so the bind is permitted.
    config: |
      log:
        level: info
      cache:
        enabled: false
      runner:
        labels:
          - "ubuntu-latest:docker://catthehacker/ubuntu:act-22.04"
          - "ubuntu-deploy:docker://gitea.zen.lofi/sfi/action-runner:58714d0"
      container:
        network: bridge
        docker_timeout: 300s
        options: --volume /run/ssh-secrets:/run/ssh-secrets:ro
        valid_volumes:
          - /run/ssh-secrets
    extraEnvs:
      - name: ACTIONS_RESULTS_URL
        value: "http://gha-cache.gha-cache.svc.cluster.local:3000/"
      - name: ACTIONS_CACHE_URL
        value: "http://gha-cache.gha-cache.svc.cluster.local:3000/"
      - name: RUNNER_TOOL_CACHE
        value: "/data/toolcache"

  dind:
    registry: gitea.zen.lofi
    repository: sfi/dind
    tag: "58714d0"
    pullPolicy: IfNotPresent
    extraVolumeMounts:
      - name: runner-ssh
        mountPath: /run/ssh-secrets
        readOnly: true


init:
  image:
    registry: docker.io
    repository: busybox
    tag: "1.37.0"

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
