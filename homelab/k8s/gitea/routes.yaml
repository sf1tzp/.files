# HTTPRoute for Gitea web UI
# Requires DNS: gitea.lofi -> any k8s node IP (10.0.0.6, .7, or .8)
#
# SSH access is handled separately via NodePort 30022 on the gitea-ssh service,
# not through the Gateway (Gateway API only supports HTTP/HTTPS/gRPC/TLS).

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea
  namespace: gitea
spec:
  parentRefs:
    - name: homelab
      namespace: traefik
  hostnames:
    - gitea.lofi
  rules:
    - backendRefs:
        - name: gitea-http
          port: 3000
