# Prerequisites:
#   1. Create a Gitea PAT with write:packages scope
#      (Settings > Applications > Generate Token)
#   2. Add it as a repo/org Actions secret named REGISTRY_TOKEN
#      (repo Settings > Actions > Secrets)

name: CI

on:
  push:

env:
  REGISTRY: gitea.zen.lofi

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - uses: extractions/setup-just@v3
        with:
          github-token: ${{ secrets.CONNECTION_PAT }}
      - name: Run lint
        run: just lint

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ env.REGISTRY }}/${{ gitea.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Gitea registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | \
            docker login "${{ env.REGISTRY }}" \
              --username "${{ gitea.actor }}" \
              --password-stdin

      - name: Build and push
        env:
          GITEA_SHA: ${{ gitea.sha }}
        run: |
          set -euo pipefail
          SHORT="${GITEA_SHA:0:7}"
          docker build -t "$IMAGE:$SHORT" .
          docker push "$IMAGE:$SHORT"

  # Note:
  # Before the first run, three Actions secrets need to exist in Gitea: SSH_PRIVATE_KEY, SSH_KNOWN_HOSTS, SOPS_AGE_KEY.
  # The matching public key must be added to authorized_keys on web2.streetfortress.cloud.
  # Until those are set, the deploy-prod job will fail on the SSH step — lint, build, and push will still succeed.

  deploy-prod:
    needs: build-and-push
    if: gitea.ref == 'refs/heads/image-tagging'
    runs-on: ubuntu-latest
    env:
      HOST: web2.streetfortress.cloud
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v3
        with:
          github-token: ${{ secrets.CONNECTION_PAT }}

      - name: Install sops and age
        run: |
          set -euo pipefail
          SOPS_VERSION=v3.9.0
          curl -sSfL -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          sudo apt-get update -qq
          sudo apt-get install -y -qq age

      - name: Configure sops age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          printf '%s\n' "$SSH_CONFIG" > ~/.ssh/config
          chmod 644 ~/.ssh/config

      - name: Deploy to prod
        env:
          GITEA_SHA: ${{ gitea.sha }}
        run: |
          set -euo pipefail
          SHORT="${GITEA_SHA:0:7}"
          just deploy-prod "$HOST" "$SHORT"
