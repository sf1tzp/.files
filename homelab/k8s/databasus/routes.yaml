apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: databasus
  namespace: databasus
spec:
  parentRefs:
    - name: homelab
      namespace: traefik
      sectionName: https-databasus
  hostnames:
    - databasus.zen.lofi
  rules:
    - backendRefs:
        - name: databasus-service
          port: 4005
