# Traefik Helm chart values
# Chart: traefik/traefik
# Docs: https://doc.traefik.io/traefik/routing/providers/kubernetes-gateway/

# --- Gateway API provider ---
providers:
  kubernetesGateway:
    enabled: true
  kubernetesIngress:
    enabled: false

experimental:
  kubernetesGateway:
    enabled: false

# Don't auto-create Gateway API resources - we manage them in gateway.yaml
gateway:
  enabled: false

# --- Deployment ---
deployment:
  kind: DaemonSet

# --- Entrypoints ---
ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    hostPort: 80
    protocol: TCP
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    hostPort: 443
    protocol: TCP

service:
  type: ClusterIP # hostPort handles external access

# --- Logging ---
logs:
  general:
    level: INFO
  access:
    enabled: true

# --- Dashboard ---
ingressRoute:
  dashboard:
    enabled: false
