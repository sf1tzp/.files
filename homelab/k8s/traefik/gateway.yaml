# Gateway API resources for the homelab k8s cluster
#
# Architecture:
#   GatewayClass (cluster-scoped) -> tells k8s "traefik is a gateway implementation"
#   Gateway (namespace-scoped)    -> defines listeners (ports/protocols) and which namespaces can attach routes
#   HTTPRoute (namespace-scoped)  -> per-service routing rules, created alongside each service
#
# Docs: https://gateway-api.sigs.k8s.io/

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab
  namespace: traefik
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https-gitea
      port: 8443
      protocol: HTTPS
      hostname: gitea.zen.lofi
      tls:
        mode: Terminate
        certificateRefs:
          - name: gitea-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-pgadmin
      port: 8443
      protocol: HTTPS
      hostname: pgadmin.zen.lofi
      tls:
        mode: Terminate
        certificateRefs:
          - name: pgadmin-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-rustfs-s3
      port: 8443
      protocol: HTTPS
      hostname: s3.zen.lofi
      tls:
        mode: Terminate
        certificateRefs:
          - name: rustfs-s3-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-rustfs-console
      port: 8443
      protocol: HTTPS
      hostname: s3-console.zen.lofi
      tls:
        mode: Terminate
        certificateRefs:
          - name: rustfs-console-tls
      allowedRoutes:
        namespaces:
          from: All

---
# Redirect HTTP -> HTTPS for all hostnames.
# cert-manager ACME challenge routes also attach to the http listener
# with an exact path match, so they take precedence over this catch-all.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https
  namespace: traefik
spec:
  parentRefs:
    - name: homelab
      namespace: traefik
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
