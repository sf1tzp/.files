---
- name: Install and configure Wireguard on homelab hosts
  hosts: wireguard
  become: yes
  serial: 1  # serialize to avoid concurrent peers.json mutations
  vars:
    vault_password: "{{ lookup('env', 'ANSIBLE_VAULT_PASSWORD') }}"
    wg_keys_file: "~/.homelab-wireguard-keys.yaml"
    peers_file: "{{ playbook_dir }}/peers.json"
    wg_port: 51820
  tasks:
    - name: Install Wireguard packages
      ansible.builtin.package:
        name:
          - wireguard-tools
          - wireguard
        state: present

    # --- Private key management (vault-encrypted keys file, unchanged from prior playbook) ---
    - name: Check if private keys file exists
      ansible.builtin.stat:
        path: "{{ wg_keys_file }}"
      register: keys_file
      delegate_to: localhost
      become: no

    - name: Initialize private keys file with empty structure
      ansible.builtin.copy:
        content: "wireguard:\n  private_keys: {}\n"
        dest: "{{ wg_keys_file }}"
        mode: "0600"
        force: false
      when: not keys_file.stat.exists
      delegate_to: localhost
      become: no

    - name: Check for existing private key
      ansible.builtin.command:
        cmd: yq -e '.wireguard.private_keys.{{ inventory_hostname }}' {{ wg_keys_file }}
      register: private_key_check
      failed_when: false
      changed_when: false
      delegate_to: localhost
      become: no

    - name: Set fact if private key exists
      ansible.builtin.set_fact:
        private_key_not_set: "{{ private_key_check.rc != 0 }}"

    - name: Generate Wireguard private key
      ansible.builtin.command:
        cmd: wg genkey
      register: wg_private_key
      when: private_key_not_set
      delegate_to: localhost
      become: no

    - name: Encrypt private key
      ansible.builtin.set_fact:
        encrypted_private_key: "{{ wg_private_key.stdout | vault(vault_password) }}"
      when: private_key_not_set

    - name: Store encrypted private key in vault
      ansible.builtin.command:
        cmd: yq -i '.wireguard.private_keys.{{ inventory_hostname }} = "{{ encrypted_private_key }}"' {{ wg_keys_file }}
      when: private_key_not_set
      delegate_to: localhost
      become: no

    - name: Retrieve existing private key from vault
      ansible.builtin.command:
        cmd: yq -e '.wireguard.private_keys.{{ inventory_hostname }}' {{ wg_keys_file }}
      register: existing_private_key
      when: not private_key_not_set
      delegate_to: localhost
      become: no

    - name: Decrypt existing private key
      ansible.builtin.set_fact:
        decrypted_private_key: "{{ existing_private_key.stdout | unvault(vault_password) }}"
      when: not private_key_not_set

    - name: Set private key fact for new key
      ansible.builtin.set_fact:
        current_private_key: "{{ wg_private_key.stdout }}"
      when: private_key_not_set

    - name: Set private key fact for existing key
      ansible.builtin.set_fact:
        current_private_key: "{{ decrypted_private_key }}"
      when: not private_key_not_set

    - name: Set private key for template
      ansible.builtin.set_fact:
        private_key: "{{ current_private_key }}"

    - name: Derive public key from private key
      ansible.builtin.shell:
        cmd: echo '{{ current_private_key }}' | wg pubkey
      register: wg_public_key
      changed_when: false
      delegate_to: localhost
      become: no

    # --- peers.json is the source of truth for all peer metadata ---
    - name: Read peers.json
      ansible.builtin.include_vars:
        file: "{{ peers_file }}"
        name: peers_data

    - name: Read committed pubkey for this host
      ansible.builtin.set_fact:
        committed_pubkey: "{{ peers_data.peers[inventory_hostname].public_key | default('') }}"

    - name: Write this host's pubkey into peers.json if empty
      ansible.builtin.command:
        cmd: >-
          jq --arg k "{{ wg_public_key.stdout }}"
             '.peers["{{ inventory_hostname }}"].public_key = $k'
             {{ peers_file }}
      register: peers_json_patched
      changed_when: true
      when: committed_pubkey == ""
      delegate_to: localhost
      become: no

    - name: Persist patched peers.json
      ansible.builtin.copy:
        content: "{{ peers_json_patched.stdout }}\n"
        dest: "{{ peers_file }}"
        mode: "0644"
      when: committed_pubkey == ""
      delegate_to: localhost
      become: no

    - name: Re-read peers.json after pubkey write
      ansible.builtin.include_vars:
        file: "{{ peers_file }}"
        name: peers_data
      when: committed_pubkey == ""

    - name: Fail if committed pubkey does not match this host's key
      ansible.builtin.fail:
        msg: >-
          peers.json has public_key '{{ committed_pubkey }}' for {{ inventory_hostname }},
          but the private key in {{ wg_keys_file }} derives to '{{ wg_public_key.stdout }}'.
          Someone regenerated a key. Reconcile manually.
      when:
        - committed_pubkey != ""
        - committed_pubkey != wg_public_key.stdout

    - name: Fail if this host is missing from peers.json
      ansible.builtin.fail:
        msg: "{{ inventory_hostname }} is not listed under peers in {{ peers_file }}"
      when: inventory_hostname not in peers_data.peers

    # --- Render and deploy wg0.conf ---
    - name: Create Wireguard configuration directory
      ansible.builtin.file:
        path: /etc/wireguard
        state: directory
        mode: "0700"

    - name: Render wg0.conf
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/wg0.conf.j2"
        dest: /etc/wireguard/wg0.conf
        mode: "0600"
      notify: restart wireguard

    - name: Enable and start Wireguard
      ansible.builtin.service:
        name: wg-quick@wg0
        enabled: yes
        state: started

    # Split-DNS: route *.lofi queries over the tunnel to soundship's dnsmasq.
    # Only needed on hosts that can't reach soundship on the LAN directly —
    # the streetfortress.cloud VMs.
    - name: Ensure systemd-resolved drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"
      when: "'streetfortress-cloud' in inventory_hostname"

    - name: Install homelab resolved.conf drop-in
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/homelab-resolved.conf.j2"
        dest: /etc/systemd/resolved.conf.d/homelab.conf
        mode: "0644"
      notify: restart systemd-resolved
      when: "'streetfortress-cloud' in inventory_hostname"

  handlers:
    - name: restart wireguard
      ansible.builtin.service:
        name: wg-quick@wg0
        state: restarted

    - name: restart systemd-resolved
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted
