---
# Postgres Credential Rotation Playbook
#
# Rotates the Postgres password and updates all dependent services.
# Runs entirely from the control node (devbox), SSHing to remote hosts as needed.
#
# Usage:
#   ansible-playbook rotate-credentials.yaml -e db_host=staging-db
#   ansible-playbook rotate-credentials.yaml -e db_host=db2.streetfortress.cloud
#
# Optional:
#   -e new_password=<password>    Provide a specific password instead of generating one
#   -e skip_verify=true           Skip the post-rotation verification step
#   --check                       Dry-run mode (no changes made)

- name: Rotate Postgres credentials
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    config_file: "{{ playbook_dir }}/rotation-services.yaml"
    nerdctl: ~/.local/bin/nerdctl

  pre_tasks:
    - name: Load rotation services config
      include_vars:
        file: "{{ config_file }}"
        name: rotation_config

    - name: Validate db_host
      assert:
        that:
          - db_host is defined
          - db_host in rotation_config.hosts
        fail_msg: >
          Must specify a valid db host with -e db_host=<hostname>.
          Available: {{ rotation_config.hosts.keys() | list }}

    - name: Set host config
      set_fact:
        host_config: "{{ rotation_config.hosts[db_host] }}"

  tasks:
    # -- Step 1: Generate new password --
    - name: Generate new password
      command: openssl rand -hex 32
      register: generated_password
      when: new_password is not defined
      changed_when: false

    - name: Set password fact
      set_fact:
        pg_new_password: "{{ new_password | default(generated_password.stdout) }}"
      no_log: true

    - name: Display password (save this for rollback)
      debug:
        msg: "New password generated. Store securely for rollback if needed."

    # -- Step 2: Retrieve old password from postgres SOPS env --
    - name: Decrypt current postgres env to get old password
      shell: sops -d {{ host_config.postgres_secrets_file }}
      register: current_env
      changed_when: false
      no_log: true

    - name: Extract old password
      set_fact:
        pg_old_password: >-
          {{ current_env.stdout_lines
             | select('match', '^POSTGRES_PASSWORD=')
             | first
             | regex_replace('^POSTGRES_PASSWORD=', '') }}
      no_log: true

    - name: Abort if old and new passwords are the same
      assert:
        that: pg_old_password != pg_new_password
        fail_msg: "New password is the same as the current password. Aborting."

    # -- Step 3: Change password in Postgres --
    - name: Alter Postgres user password on {{ db_host }}
      shell: >
        ssh {{ db_host }}
        "{{ nerdctl }} exec postgres-server
        psql -U {{ host_config.postgres_user }} -c
        \"ALTER USER {{ host_config.postgres_user }} PASSWORD '{{ pg_new_password }}';\""
      no_log: true

    - name: Verify new password works against Postgres
      shell: >
        ssh {{ db_host }}
        "{{ nerdctl }} exec -e PGPASSWORD='{{ pg_new_password }}' postgres-server
        psql -U {{ host_config.postgres_user }} -h localhost -c '\conninfo'"
      no_log: true

    # -- Step 4: Update all SOPS-encrypted env files --
    - name: Update postgres SOPS env
      shell: >
        echo -n '"{{ pg_new_password }}"'
        | sops set --input-type dotenv --output-type dotenv --value-stdin
        {{ host_config.postgres_secrets_file }} '["POSTGRES_PASSWORD"]'
      no_log: true

    - name: Update service SOPS env files
      include_tasks: tasks/update-sops-env.yaml
      loop: "{{ host_config.services }}"
      loop_control:
        loop_var: service
        label: "{{ service.name }}"

    # -- Step 5: Bounce postgres, then build & deploy app services --
    - name: Push updated env to postgres on {{ db_host }}
      shell: >
        sops -d {{ host_config.postgres_secrets_file }}
        | ssh {{ db_host }} "cat > {{ host_config.postgres_env_path }}"
      no_log: true

    - name: Bounce postgres on {{ db_host }}
      shell: >
        ssh {{ db_host }}
        "{{ nerdctl }} compose -f {{ host_config.postgres_compose_file }} down
        && {{ nerdctl }} compose -f {{ host_config.postgres_compose_file }} up -d
        --env-file {{ host_config.postgres_env_path }}"

    - name: Build and deploy app services via justfile
      include_tasks: tasks/deploy-and-bounce.yaml
      loop: "{{ host_config.services }}"
      loop_control:
        loop_var: service
        label: "{{ service.name }}"

    # -- Step 6: Verify --
    - name: Verify services are healthy
      include_tasks: tasks/verify.yaml
      when: skip_verify is not defined or not skip_verify
