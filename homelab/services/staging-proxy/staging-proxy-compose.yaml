services:
  caddy:
    container_name: staging-proxy
    image: caddy:2.10-alpine
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddyfiles:/etc/caddy/caddyfiles

      # Certificate storage (IMPORTANT - preserves SSL certs across restarts)
      - caddy-data:/data
      - caddy-config:/config
      - step-ca-data:/step-ca-data:ro
    environment:
      - SSL_CERT_DIR=/step-ca-data/certs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - staging-network
    depends_on:
      - step-ca

  step-ca:
    container_name: staging-step-ca
    image: smallstep/step-ca:0.29.0
    ports:
      - 9000:9000
    volumes:
      - step-ca-data:/home/step
    environment:
      - DOCKER_STEPCA_INIT_NAME=lofi staging CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost,127.0.0.1,step-ca.staging.lofi,staging-step-ca
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
      - DOCKER_STEPCA_INIT_PASSWORD=your-secure-password-here
      - DOCKER_STEPCA_INIT_ACME=true
    networks:
      staging-network:
        aliases:
          - step-ca.staging.lofi

volumes:
  caddy-data:
  caddy-config:
  step-ca-data:

networks:
  staging-network:
    driver: bridge
