# place in /etc/dnsmasq.conf
domain-needed
bogus-priv
no-resolv

# Return the A record whose subnet matches the querier's source address,
# so LAN clients get LAN IPs and VPN clients get wg IPs for the same name.
localise-queries

listen-address=10.0.0.2,10.1.0.1

server=9.9.9.9
server=149.112.112.112

domain=.lofi

# Resolve names to 10.0.0.2 (Caddy)
address=/step-ca.lofi/10.0.0.2

address=/grafana.lofi/10.0.0.2
address=/prometheus.lofi/10.0.0.2
address=/llm.lofi/10.0.0.2
address=/chat.lofi/10.0.0.2
address=/traggo.lofi/10.0.0.2
address=/pgadmin.lofi/10.0.0.2

address=/zen.lofi/10.0.0.6
address=/zen.lofi/10.1.0.6

address=/staging.lofi/10.0.0.31

address=/pgadmin.streetfortress.lofi/10.1.0.51


address=/reddit.com/0.0.0.0
address=/pornhub.com/0.0.0.0
address=/babesource.com/0.0.0.0
address=/redgifs.com/0.0.0.0
